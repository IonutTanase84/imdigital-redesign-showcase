<div class="row justify-content-center text-center showcase-heading-row">
  <div class="col-12 col-xl-9">
    <h2 class="stage-reveal">{{ content.title }}</h2>
  </div>
</div>

<div class="row g-3 g-lg-4 justify-content-center showcase-grid">
  @for (card of content.cards; track trackCard($index)) {
    <div class="col-12 col-md-6 col-xl-3 stage-reveal">
      <app-feature-card
        [title]="card.title"
        [icon]="card.icon"
        [hoverText]="card.hoverText"
        variant="compact"
      />
    </div>
  }
</div>
